<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>doc-share &mdash; Audit Trail</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">doc-share</div>
    <nav>
      <a href="/upload.html">Upload</a>
      <a href="/documents.html">My Documents</a>
      <a href="/audit.html" class="active">Audit Trail</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <h1>Audit Trail</h1>
      <p class="subtitle">
        Every upload, list, and download recorded for a household, newest first. Each event is
        chained to the one before it so tampering is detectable &mdash; see <code>make audit-verify</code>.
      </p>

      <form id="lookup-form" class="form-row">
        <div>
          <label for="household_id">Household ID</label>
          <input type="text" id="household_id" name="household_id" placeholder="e.g. H-1001" required />
        </div>
        <button type="submit">View</button>
      </form>

      <div id="table-wrap"></div>
    </div>
  </main>

  <script src="/js/audit.js"></script>
</body>
</html>
